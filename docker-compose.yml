services:
  postgres:
    image: postgres:16
    container_name: postgres_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: mypassword@123
      POSTGRES_DB: appdb
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend_api
    restart: unless-stopped
    depends_on:
      - postgres
    env_file:
      - ./backend/.env
    ports:
      - "5000:5000"

    # Keep this if you want node_modules inside the container
    volumes:
      - /app/node_modules

    command: npm run dev

    develop:
      watch:
        # Sync source code only
        - action: sync
          path: ./backend
          target: /app
          ignore:
            - node_modules/
            - dist/
            - .git/

        # Rebuild only when dependencies change
        - action: rebuild
          path: ./backend/package.json

        - action: rebuild
          path: ./backend/package-lock.json

        # Optional: rebuild if Dockerfile changes
        - action: rebuild
          path: ./backend/Dockerfile

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend_app
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:3000"

    environment:
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"

    volumes:
      - /app/node_modules

    command: npm run dev

    develop:
      watch:
        # Sync Next.js source
        - action: sync
          path: ./frontend
          target: /app
          ignore:
            - node_modules/
            - .next/
            - .git/

        # Rebuild only if dependencies change
        - action: rebuild
          path: ./frontend/package.json

        - action: rebuild
          path: ./frontend/package-lock.json

        # Optional
        - action: rebuild
          path: ./frontend/Dockerfile

volumes:
  postgres_data:
